<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了｜DXコンサル</title>
  <meta name="description" content="DXコンサルへのお問い合わせありがとうございます。">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VJM1T8F6K6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VJM1T8F6K6');
  </script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0D2B4E;--teal:#0A7B74;--teal-light:#12A89E;--blue:#1A6FBB;--blue-light:#E0F0FF;--accent:#F5A623;--accent2:#E8522A;--text:#1A1A1A;--text-sub:#555;--bg:#FFF;--bg-gray:#F7F9FC;--border:#DDE6EF;--radius:10px;--shadow:0 4px 24px rgba(13,43,78,.10);--shadow-lg:0 8px 40px rgba(13,43,78,.18);--max:1060px;--font:'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.8;font-size:16px;}
    a{color:var(--blue);text-decoration:none;}
    .container{max-width:var(--max);margin:0 auto;padding:0 24px;}
    .section{padding:88px 0;}
    .section-gray{background:var(--bg-gray);}
    .label{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--teal);background:#E0F5F4;padding:4px 16px;border-radius:20px;margin-bottom:14px;}
    .sec-title{font-size:clamp(24px,3.8vw,36px);font-weight:900;line-height:1.35;margin-bottom:14px;}
    .sec-sub{font-size:15px;color:var(--text-sub);max-width:620px;line-height:1.9;}
    .sec-head{text-align:center;margin-bottom:48px;}
    .sec-head .sec-sub{margin:0 auto;}

    /* HEADER */
    #hd{position:relative;z-index:100;background:rgba(255,255,255,.97);border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(13,43,78,.07);}
    .hd-inner{display:flex;align-items:center;justify-content:space-between;height:68px;max-width:var(--max);margin:0 auto;padding:0 24px;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-img{height:38px;width:auto;display:block;}
    .logo-text{font-size:26px;font-weight:900;color:var(--navy);letter-spacing:.02em;line-height:1;}
    .hd-nav{display:flex;align-items:center;gap:28px;}
    .hd-nav a{font-size:14px;font-weight:500;color:var(--text);position:relative;padding-bottom:2px;}
    .hd-nav a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:var(--teal);transition:width .2s;}
    .hd-nav a:hover::after,.hd-nav a.active::after{width:100%;}
    .hd-nav a.active{color:var(--teal);font-weight:700;}
    .hd-cta{background:var(--accent2);color:#fff !important;padding:10px 22px;border-radius:50px;font-weight:700 !important;font-size:13px !important;box-shadow:0 3px 12px rgba(232,82,42,.32);transition:all .2s;}
    .hd-cta::after{display:none !important;}
    .hd-cta:hover{background:#c93d1e !important;transform:translateY(-1px);}

    /* PAGE HERO */
    .page-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);padding:64px 0;text-align:center;color:#fff;}
    .page-hero h1{font-size:clamp(26px,4vw,42px);font-weight:900;margin-bottom:12px;}
    .page-hero p{font-size:15px;color:rgba(255,255,255,.8);max-width:540px;margin:0 auto;}

    /* THANKS MESSAGE */
    .thanks-container{display:flex;justify-content:center;align-items:center;min-height:400px;}
    .thanks-card{background:#E0F5F4;border:2px solid var(--teal-light);border-radius:16px;padding:60px 40px;text-align:center;max-width:500px;box-shadow:var(--shadow-lg);}
    .thanks-icon{font-size:48px;margin-bottom:20px;}
    .thanks-card h2{color:var(--teal);font-size:28px;font-weight:900;margin-bottom:16px;}
    .thanks-card p{font-size:15px;color:var(--text-sub);line-height:1.9;margin-bottom:28px;}
    .thanks-link{display:inline-block;background:var(--accent2);color:#fff;padding:13px 28px;border-radius:50px;font-weight:700;transition:background .2s,transform .2s;box-shadow:0 4px 18px rgba(232,82,42,.35);}
    .thanks-link:hover{background:#d04420;transform:translateY(-2px);}

    /* FOOTER */
    #footer{background:var(--navy);color:rgba(255,255,255,.75);padding:52px 0 28px;}
    .footer-top{display:grid;grid-template-columns:1fr auto;gap:48px;margin-bottom:36px;}
    .footer-logo-img{height:34px;width:auto;display:block;margin-bottom:14px;}
    .footer-lead{font-size:13px;line-height:1.8;max-width:340px;}
    .footer-info{margin-top:18px;font-size:13px;display:flex;flex-direction:column;gap:5px;}
    .footer-info a{color:rgba(255,255,255,.75);}
    .footer-nav{display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
    .footer-nav a{font-size:14px;color:rgba(255,255,255,.7);transition:color .2s;}
    .footer-nav a:hover{color:#6EFFF9;}
    .footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:20px;text-align:center;font-size:12px;color:rgba(255,255,255,.45);}

    @media(max-width:900px){
      .footer-top{grid-template-columns:1fr;gap:24px;}
      .footer-nav{align-items:flex-start;}
    }
    @media(max-width:600px){
      .section{padding:60px 0;}
      .hd-nav{display:none;}
      .thanks-card{padding:40px 24px;}
      .thanks-card h2{font-size:24px;}
    }
    .fi{opacity:0;transform:translateY(22px);transition:opacity .5s ease,transform .5s ease;}
    .fi.vis{opacity:1;transform:none;}
  </style>
</head>
<body>

<!-- HEADER -->
<header id="hd">
  <div class="hd-inner">
    <a class="logo" href="index.html">
      <img src="./画像/DXコンサルロゴ.png" alt="DXコンサル" class="logo-img">
      <span class="logo-text">DXコンサル</span>
    </a>
    <nav class="hd-nav">
      <a href="index.html">ホーム</a>
      <a href="service.html">サービス</a>
      <a href="cases.html">ユースケース・FAQ</a>
      <a href="contact.html" class="hd-cta">無料相談はこちら →</a>
    </nav>
  </div>
</header>

<!-- PAGE HERO -->
<div class="page-hero">
  <h1>送信完了</h1>
  <p>お問い合わせありがとうございます。</p>
</div>

<!-- THANKS SECTION -->
<section class="section">
  <div class="container">
    <div class="thanks-container fi">
      <div class="thanks-card">
        <div class="thanks-icon">✅</div>
        <h2>送信完了しました</h2>
        <p>お問い合わせありがとうございます。<br>担当者より1〜2営業日以内にご連絡いたします。</p>
        <a href="index.html" class="thanks-link">サイトに戻る →</a>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer id="footer">
  <div class="container">
    <div class="footer-top">
      <div class="footer-brand">
        <img src="./画像/DXコンサルロゴ.png" alt="DXコンサル" class="footer-logo-img">
        <p class="footer-lead">IT専任者が不在でも大丈夫。デジタル経営をもっと身近に。中小企業・小規模事業者さまのDX化を支援します。</p>
      </div>
      <nav class="footer-nav">
        <a href="index.html">ホーム</a>
        <a href="service.html">サービス案内</a>
        <a href="cases.html">コンサルティング事例</a>
        <a href="cases.html#faq">よくある質問</a>
        <a href="contact.html">お問い合わせ</a>
        <a href="privacy.html">個人情報保護方針</a>
      </nav>
    </div>
    <div class="footer-bottom">Copyright 2025 DXコンサル All Rights Reserved.</div>
  </div>
</footer>

<script>
  // Fade-in on scroll
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');}});
  },{threshold:0.1});
  document.querySelectorAll('.fi').forEach(el=>obs.observe(el));
</script>
</body>
</html>
